<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La tua foresta — Walkfulness</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1f0e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(to bottom, #0a1628 0%, #1a2d4a 40%, #2d5a3d 75%, #1a3d22 100%);
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #ui {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    padding: 28px 20px 0;
    text-align: center;
  }

  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 6px 16px;
    margin-bottom: 12px;
  }

  .level-text {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.5px;
  }

  .forest-title {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .forest-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 20px;
  }

  .progress-wrap {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    text-align: left;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .progress-numbers {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
  }

  .progress-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, #4ade80, #86efac);
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .trees-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .tree-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
  }

  .chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  #forest-canvas {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 520px;
    display: block;
  }

  .fog {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to top, #0d1f0e, transparent);
    z-index: 6;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="sky"></div>
<canvas class="stars" id="stars-canvas"></canvas>

<div id="ui">
  <div class="level-badge">
    <span class="level-text" id="level-label">Livello 1</span>
  </div>
  <h1 class="forest-title" id="forest-title">La tua foresta</h1>
  <p class="forest-subtitle" id="forest-sub">Esplora il tuo progresso</p>

  <div class="progress-wrap">
    <div class="progress-row">
      <span class="progress-label">Progresso del livello</span>
      <span class="progress-numbers" id="progress-numbers">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="trees-row" id="trees-chips"></div>
</div>

<canvas id="forest-canvas"></canvas>
<div class="fog"></div>

<script>
// --- LOGICA LIVELLI ---
function getTreesForLevel(lvl) { return lvl * 5; }

function getPreviousTreesTotal(lvl) {
  let total = 0;
  for (let i = 1; i < lvl; i++) total += getTreesForLevel(i);
  return total;
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  const level = Math.max(1, parseInt(p.get('level')) || 1);
  const progress = Math.max(0, Math.min(1, parseFloat(p.get('progress')) || 0));
  return { level, progress };
}

const { level, progress } = getParams();
const treesForCurrentLevel = getTreesForLevel(level);
const previousTrees = getPreviousTreesTotal(level);
const currentLevelTrees = Math.floor(treesForCurrentLevel * progress);
const totalTrees = previousTrees + currentLevelTrees;

const colors = ["#4ade80", "#86efac", "#22c55e", "#16a34a", "#15803d"];
const themeColor = colors[(level - 1) % colors.length];

document.getElementById('level-label').textContent = `Livello ${level}`;
document.getElementById('progress-numbers').textContent = `${currentLevelTrees} / ${treesForCurrentLevel} alberi`;

setTimeout(() => { document.getElementById('progress-fill').style.width = (progress * 100).toFixed(1) + '%'; }, 100);

const chips = document.getElementById('trees-chips');
if (previousTrees > 0) {
  chips.innerHTML += `<div class="tree-chip"><div class="chip-dot" style="background:#86efac"></div> ${previousTrees} alberi dai livelli passati</div>`;
}
if (currentLevelTrees > 0) {
  chips.innerHTML += `<div class="tree-chip"><div class="chip-dot" style="background:${themeColor}"></div> ${currentLevelTrees} alberi in questo livello</div>`;
}
if (totalTrees === 0) {
  chips.innerHTML += `<div class="tree-chip"><div class="chip-dot" style="background:#6b7280"></div> Inizia a camminare per piantare alberi</div>`;
}

// --- SETUP DIMENSIONI ---
const W = Math.min(window.innerWidth, 520);
const H = Math.round(W * 1.1);

const treeImg = new Image();
treeImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);

const cachedTreeCanvas = document.createElement('canvas');
const cachedCtx = cachedTreeCanvas.getContext('2d');
cachedTreeCanvas.width = 250; 
cachedTreeCanvas.height = 250;

let isTreeCached = false;
treeImg.onload = () => {
  cachedCtx.drawImage(treeImg, 0, 0, 250, 250);
  isTreeCached = true;
};

// 2. Cache Lucciole
function createGlowSprite(r, g, b) {
  const c = document.createElement('canvas');
  const size = 60;
  const center = size / 2;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const grd = ctx.createRadialGradient(center, center, 0, center, center, center);
  grd.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.6)`);
  grd.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.beginPath(); ctx.arc(center, center, 2, 0, Math.PI * 2); ctx.fill();
  return c;
}
const fireflyYellowSprite = createGlowSprite(255, 255, 160);
const fireflyGreenSprite = createGlowSprite(184, 255, 138);

// 3. Cache Luna
const moonSprite = document.createElement('canvas');
moonSprite.width = 100; moonSprite.height = 100;
const mCtx = moonSprite.getContext('2d');
const moonGrd = mCtx.createRadialGradient(45, 45, 2, 50, 50, 22);
moonGrd.addColorStop(0, 'rgba(255,255,220,0.95)');
moonGrd.addColorStop(0.7, 'rgba(240,230,180,0.8)');
moonGrd.addColorStop(1, 'rgba(200,190,140,0)');
mCtx.fillStyle = moonGrd; mCtx.fillRect(0, 0, 100, 100);
mCtx.fillStyle = 'rgba(255,255,200,0.15)';
mCtx.beginPath(); mCtx.arc(50, 50, 30, 0, Math.PI*2); mCtx.fill();

// 4. Cache Nebbia
const mistSprite = document.createElement('canvas');
const mistRadius = W * 0.4;
mistSprite.width = mistRadius * 2; mistSprite.height = mistRadius * 2;
const mstCtx = mistSprite.getContext('2d');
const mistGrd = mstCtx.createRadialGradient(mistRadius, mistRadius, 0, mistRadius, mistRadius, mistRadius);
mistGrd.addColorStop(0, 'rgba(100,200,130,0.04)');
mistGrd.addColorStop(1, 'transparent');
mstCtx.fillStyle = mistGrd; mstCtx.fillRect(0, 0, mistRadius*2, mistRadius*2);

// ============================================================================
// --- LOGICA ANIMAZIONI ---
// ============================================================================

const sc = document.getElementById('stars-canvas');
sc.width = window.innerWidth;
sc.height = window.innerHeight;
const sx = sc.getContext('2d');
const stars = Array.from({length: 120}, () => ({
  x: Math.random() * sc.width, y: Math.random() * sc.height * 0.55,
  r: Math.random() * 1.2 + 0.3, phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.015 + 0.005
}));

const fc = document.getElementById('forest-canvas');
const fctx = fc.getContext('2d');
fc.width = W; fc.height = H;
fc.style.width = W + 'px'; fc.style.height = H + 'px';

const rng = (() => {
  let seed = 42 + level * 137 + Math.floor(progress * 1000);
  return () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };
})();

const fireflies = Array.from({length: Math.min(totalTrees * 2 + 5, 40)}, () => ({
  x: rng() * W, y: H * 0.3 + rng() * H * 0.5,
  vx: (rng() - 0.5) * 0.4, vy: (rng() - 0.5) * 0.3,
  phase: rng() * Math.PI * 2, speed: rng() * 0.04 + 0.02,
  size: rng() * 1.5 + 0.8, color: rng() > 0.3 ? '#b8ff8a' : '#ffffa0',
}));

const particles = totalTrees > 0 ? Array.from({length: 15}, () => ({
  x: rng() * W, y: H * 0.4 + rng() * H * 0.4,
  size: rng() * 2 + 0.5, speed: rng() * 0.3 + 0.1,
  alpha: rng() * 0.3 + 0.05, phase: rng() * Math.PI * 2,
})) : [];

function buildTreeList() {
  const trees = [];
  const groundY = H * 0.78;
  const rows = 4;
  const treesToDraw = Math.min(totalTrees, 100); // Abbassato max a 100 alberi per fluidità assoluta
  if (treesToDraw <= 0) return trees;

  const perRow = Math.ceil(treesToDraw / rows);
  let placed = 0;

  for (let row = 0; row < rows && placed < treesToDraw; row++) {
    const rowFrac = row / rows;
    const baseY = groundY * (0.72 + rowFrac * 0.24);
    const rowCount = Math.min(perRow, treesToDraw - placed);
    const spread = W * 0.9;
    const startX = W * 0.05;

    for (let i = 0; i < rowCount; i++) {
      const baseX = startX + (i / Math.max(rowCount - 1, 1)) * spread;
      const jitterX = (rng() - 0.5) * (spread / Math.max(rowCount, 2)) * 0.85;
      trees.push({
        x: baseX + jitterX,
        y: baseY + (rng() - 0.5) * H * 0.04,
        scale: (0.55 + rowFrac * 0.45 + rng() * 0.3 - 0.1) * (0.7 + (1 - rowFrac) * 0.5),
        swayPhase: rng() * Math.PI * 2,
        swaySpeed: rng() * 0.008 + 0.004,
        depth: rowFrac,
      });
      placed++;
    }
  }
  return trees.sort((a, b) => a.y - b.y);
}
const treeList = buildTreeList();

// ============================================================================
// --- RENDER LOOP ---
// ============================================================================
function scheduleRender() {
  setTimeout(() => {
    requestAnimationFrame(render);
  }, 200); // ~20fps, sufficiente per questa scena
}


let lastT = 0;
let lastDrawTime = 0;
const fpsInterval = 1000 / 10;

function render(ts) {
  // 1. Richiediamo subito il loop successivo
  scheduleRender();

  // 2. Calcoliamo i millisecondi trascorsi dall'ultimo frame disegnato
  const elapsed = ts - lastDrawTime;

  // 3. Se non è passato abbastanza tempo (circa 33ms per 30fps), abortiamo e non disegniamo nulla!
  if (elapsed < fpsInterval) return;

  // 4. Aggiorniamo il cronometro del disegno
  lastDrawTime = ts - (elapsed % fpsInterval);

  // --- INIZIO DISEGNO EFFETTIVO ---
  const t = ts / 1000;
  lastT = t;

  // 2. Luna da Sprite
  fctx.drawImage(moonSprite, W * 0.82 - 50, H * 0.1 - 50);

  // 3. Nebbia da Sprite
  for (let i = 0; i < 3; i++) {
    const mx = Math.sin(t * 0.05 + i * 2.1) * W * 0.15 + W * (0.2 + i * 0.3);
    const my = H * (0.72 + i * 0.05);
    fctx.drawImage(mistSprite, mx - mistRadius, my - mistRadius);
  }

  // 4. Terreno
  const gh = H * 0.22;
  const gy = H - gh;
  const g = fctx.createLinearGradient(0, gy, 0, H);
  g.addColorStop(0, '#1a3d22'); g.addColorStop(0.4, '#142e1a'); g.addColorStop(1, '#0d1f0e');
  fctx.fillStyle = g;
  fctx.beginPath(); fctx.moveTo(0, gy + gh * 0.3);
  for (let x = 0; x <= W; x += 8) fctx.lineTo(x, gy + Math.sin(x * 0.03 + t * 0.2) * 6 + Math.sin(x * 0.07 - t * 0.1) * 3);
  fctx.lineTo(W, H); fctx.lineTo(0, H); fctx.closePath(); fctx.fill();

  // 5. Alberi da Sprite
  if (isTreeCached) {
    treeList.forEach(tree => {
      const sway = Math.sin(t * tree.swaySpeed * 6.28 + tree.swayPhase) * (1 + tree.depth * 0.5);
      fctx.save();
      fctx.translate(tree.x, tree.y);
      fctx.rotate(sway * 0.02);

      /*drop shadow*/
      fctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
      fctx.shadowBlur = 30 * tree.scale;
      
      const treeSize = 120 * tree.scale; 
      fctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      fctx.beginPath(); fctx.ellipse(0, 0, treeSize * 0.22, treeSize * 0.06, 0, 0, Math.PI * 2); fctx.fill();
      fctx.drawImage(cachedTreeCanvas, -treeSize/2, -treeSize, treeSize, treeSize);
      fctx.restore();
    });
  }

  if (totalTrees === 0) {
    fctx.fillStyle = 'rgba(255,255,255,0.12)'; fctx.font = '15px -apple-system, sans-serif'; fctx.textAlign = 'center';
    fctx.fillText('Inizia a camminare per vedere crescere la tua foresta', W/2, H * 0.5);
  }

  // 6. Lucciole da Sprite
  if (totalTrees > 0) {
    fireflies.forEach(f => {
      f.x += f.vx + Math.sin(t * 0.3 + f.phase) * 0.3;
      f.y += f.vy + Math.cos(t * 0.2 + f.phase * 1.3) * 0.2;
      if (f.x < 0) f.x = W; if (f.x > W) f.x = 0;
      if (f.y < H * 0.2) f.y = H * 0.8; if (f.y > H * 0.92) f.y = H * 0.3;

      const alpha = 0.3 + 0.7 * Math.sin(f.phase + t * f.speed * 3);
      if (alpha > 0.05) {
        fctx.globalAlpha = alpha;
        const sprite = f.color === '#b8ff8a' ? fireflyGreenSprite : fireflyYellowSprite;
        const drawSize = f.size * 10; 
        fctx.drawImage(sprite, f.x - drawSize/2, f.y - drawSize/2, drawSize, drawSize);
      }
    });
    fctx.globalAlpha = 1.0;
  }

  // 7. Particelle base
  particles.forEach(p => {
    p.y -= p.speed * 0.5; p.x += Math.sin(t * 0.2 + p.phase) * 0.3;
    if (p.y < H * 0.3) { p.y = H * 0.9; p.x = rng() * W; }
    fctx.fillStyle = `rgba(200,255,180,${p.alpha.toFixed(2)})`;
    fctx.beginPath(); fctx.arc(p.x, p.y, p.size, 0, Math.PI*2); fctx.fill();
  });
} // <--- QUESTA GRAFFA CHIUDE CORRETTAMENTE LA FUNZIONE RENDER

// Avviamo il loop per la prima volta
scheduleRender();

function drawStarsOnce() {
  sx.clearRect(0, 0, sc.width, sc.height);
  stars.forEach(s => {
    sx.beginPath();
    sx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sx.fillStyle = `rgba(255,255,240,${(0.4 + Math.random() * 0.5).toFixed(2)})`;
    sx.fill();
  });
}
drawStarsOnce();
